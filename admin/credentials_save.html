#!/usr/local/bin/php
<?php
require_once(__DIR__ . '/../exec/functions.php');
convertEnvToPost();

$user     = getenv('USERNAME');
$credsDir = '/usr/local/directadmin/plugins/da_dnssec_sync_manager/data/credentials';
$base     = '/CMD_PLUGINS_ADMIN/da_dnssec_sync_manager/credentials.html';
$action   = isset($_POST['action']) ? $_POST['action'] : '';

if ($action === 'delete') {
    $result = deleteCredentials($user, $credsDir);
} elseif ($action === 'save') {
    $publicKey  = isset($_POST['public_key'])  ? $_POST['public_key']  : '';
    $privateKey = isset($_POST['private_key']) ? $_POST['private_key'] : '';

    if ($publicKey === '' && $privateKey === '' && credentialsExist($user, $credsDir)) {
        $result = ['success' => true, 'message' => 'No changes made — existing credentials kept.'];
    } else {
        $result = saveCredentials($publicKey, $privateKey, $user, $credsDir);
    }
} else {
    $result = ['success' => false, 'message' => 'Error: Invalid action.'];
}

$url = flashRedirectUrl($base, $result);
?>
<meta http-equiv="refresh" content="0;url=<?= htmlspecialchars($url) ?>">
